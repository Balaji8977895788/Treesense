<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Analysis</title>

    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

header {
    background-color: #333;
    color: white;
    padding: 10px;
    text-align: center;
}

.toggle-buttons {
    margin-top: 10px;
}

.toggle-buttons button {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}

.toggle-buttons button.active {
    background-color: #45a049;
}

.toggle-buttons button:disabled {
    background-color: #cccccc;
    cursor: not-allowed;
}

.iframe-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

.loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    display: none;
}

.loading-spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.error-message {
    color: red;
    text-align: center;
    display: none;
}

    </style>
</head>
<body>
    <header>
        <h1>Analysis</h1>
        <div class="toggle-buttons">
            <button id="detection-button">Tree Count</button>
            <button id="segmentation-button">Green Cover</button>
            <button id="species-button">Tree Species</button>
            <button id="path-button">Optimal Pathing</button>
            <button id="historical-button">Historical Data</button>
        </div>
    </header>
    <div class="iframe-container">
        <iframe id="model-iframe" src="dist/index.html"></iframe>
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <p>Loading Tree Count...</p>
        </div>
        <div class="error-message" id="error-message">
            <p>Failed to load Tree Count. The model may be too large for your browser.</p>
            <p>Please try refreshing the page or use a different browser with more memory.</p>
        </div>
    </div>
    <script>
        const detectionButton = document.getElementById('detection-button');
const segmentationButton = document.getElementById('segmentation-button');
const speciesButton = document.getElementById('species-button');
const pathButton = document.getElementById('path-button');
const historicalButton = document.getElementById('historical-button');
const modelIframe = document.getElementById('model-iframe');
const loadingOverlay = document.getElementById('loading-overlay');
const errorMessage = document.getElementById('error-message');

let currentButton = detectionButton;
let loadTimeout;

// Function to show loading state
function showLoading(message = 'Loading...') {
    loadingOverlay.querySelector('p').textContent = message;
    loadingOverlay.style.display = 'flex';
    errorMessage.style.display = 'none';
    modelIframe.style.display = 'none';
    
    // Disable all buttons during loading
    [detectionButton, segmentationButton, speciesButton, pathButton, historicalButton].forEach(btn => {
        btn.disabled = true;
    });
}

// Function to hide loading state
function hideLoading() {
    loadingOverlay.style.display = 'none';
    modelIframe.style.display = 'block';
    
    // Re-enable all buttons
    [detectionButton, segmentationButton, speciesButton, pathButton, historicalButton].forEach(btn => {
        btn.disabled = false;
    });
}

// Function to show error
function showError() {
    loadingOverlay.style.display = 'none';
    errorMessage.style.display = 'block';
    modelIframe.style.display = 'none';
    
    // Re-enable all buttons
    [detectionButton, segmentationButton, speciesButton, pathButton, historicalButton].forEach(btn => {
        btn.disabled = false;
    });
}

// Function to load iframe with timeout
function loadIframe(src, button, message) {
    // Clear any existing timeout
    if (loadTimeout) {
        clearTimeout(loadTimeout);
    }
    
    // Update active button
    if (currentButton) {
        currentButton.classList.remove('active');
    }
    button.classList.add('active');
    currentButton = button;
    
    showLoading(message);
    
    // Set timeout for loading (30 seconds for tree count due to large model)
    const timeoutDuration = src.includes('dist/index.html') ? 60000 : 10000; // 60s for tree count, 10s for others
    
    loadTimeout = setTimeout(() => {
        console.error('Iframe loading timeout');
        showError();
    }, timeoutDuration);
    
    modelIframe.src = src;
}

// Handle iframe load event
modelIframe.addEventListener('load', () => {
    console.log('Iframe loaded successfully');
    clearTimeout(loadTimeout);
    hideLoading();
});

// Handle iframe error event
modelIframe.addEventListener('error', (e) => {
    console.error('Iframe failed to load:', e);
    clearTimeout(loadTimeout);
    showError();
});

// Button event listeners
detectionButton.addEventListener('click', () => {
    console.log('Loading Tree Count...');
    loadIframe('tree_counter_simple.html', detectionButton, 'Loading Tree Count...');
});

segmentationButton.addEventListener('click', () => {
    console.log('Loading Green Cover...');
    loadIframe('object_segmentation.html', segmentationButton, 'Loading Green Cover...');
});

speciesButton.addEventListener('click', () => {
    console.log('Loading Tree Species...');
    loadIframe('tree_species.html', speciesButton, 'Loading Tree Species...');
});

pathButton.addEventListener('click', () => {
    console.log('Loading Optimal Pathing...');
    loadIframe('optimal_path.html', pathButton, 'Loading Optimal Pathing...');
});

historicalButton.addEventListener('click', () => {
    console.log('Loading Historical Data...');
    loadIframe('historical_data.html', historicalButton, 'Loading Historical Data...');
});

// Initialize with tree count active
detectionButton.classList.add('active');

    </script>
});

    </script>
</body>
</html>
